apiVersion: v1
kind: Namespace
metadata:
  name: chess-api
---
# Primary: pinned to bolen, will not reschedule if node goes down
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chess-api-primary
  namespace: chess-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chess-api
      role: primary
  template:
    metadata:
      labels:
        app: chess-api
        role: primary
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - bolen-b660-ds3h-ddr4
      imagePullSecrets:
      - name: gitlab-registry
      securityContext:
        runAsUser: 1001
        runAsNonRoot: true
      containers:
      - name: chess-api
        image: registry.eliashouse.ddns.net/root/chesscomapi:latest-placeholder
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
        env:
        - name: STOCKFISH_ENGINE_PATH
          value: src/stockfish
        - name: FLASK_PORT
          value: "5000"
        - name: RUNNING_IN_K8S
          value: "true"
        - name: PYTHONUNBUFFERED
          value: "1"
        volumeMounts:
        - name: db
          mountPath: /app/SQL/chess_games.db
          subPath: chess_games.db
        - name: db
          mountPath: /app/cfg/stockfish_settings.yaml
          subPath: stockfish_settings.yaml
        - name: db
          mountPath: /app/src/stockfish
          subPath: stockfish
        - name: lichess-csv
          mountPath: /app/SQL/lichess_db_puzzle.csv
      volumes:
      - name: db
        hostPath:
          path: /opt/chess-api
          type: Directory
      - name: lichess-csv
        hostPath:
          path: /opt/chess-api/lichess_db_puzzle.csv
