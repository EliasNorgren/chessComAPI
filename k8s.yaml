# NodePort 30501 — primary (bolen)
apiVersion: v1
kind: Service
metadata:
  name: chess-api-primary
  namespace: chess-api
spec:
  type: NodePort
  selector:
    app: chess-api
    role: primary
  ports:
  - port: 5000
    targetPort: 5000
    nodePort: 30501
