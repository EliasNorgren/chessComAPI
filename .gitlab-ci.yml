stages:
  - install
  - build
  - deploy

install_everything:
  variables:
    STOCKFISH_ENGINE_PATH: "/usr/bin/stockfish-17-64"
  stage: install
  script:
    - ./install.sh
    - echo "Installation complete"
    - ./test/test_flask_server.sh
    - echo "All tests passed"

build_and_push:
  stage: build

  variables:
    IMAGE_TAG: "registry.eliashouse.ddns.net/root/chesscomapi:$CI_COMMIT_SHORT_SHA"
    CACHE_TAG: "registry.eliashouse.ddns.net/root/chesscomapi:buildcache"

  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login registry.eliashouse.ddns.net -u "$CI_REGISTRY_USER" --password-stdin
    - docker run --privileged --rm tonistiigi/binfmt --install all
    - printf '[registry."registry.eliashouse.ddns.net"]\n  http = true\n  insecure = true\n' > /tmp/buildkitd.toml
    - docker buildx rm multiarch 2>/dev/null || true
    - docker buildx create --name multiarch --driver docker-container --driver-opt network=host --config /tmp/buildkitd.toml
    - docker buildx use multiarch
    - docker buildx inspect --bootstrap

  script:
    - echo building image with tag "$IMAGE_TAG"
    - docker buildx build
        --platform linux/amd64,linux/arm64
        -t "$IMAGE_TAG"
        --cache-from type=registry,ref="$CACHE_TAG"
        --cache-to type=registry,ref="$CACHE_TAG",mode=max
        --push .

  only:
    - master

deploy:
  stage: deploy
  script:
    - kubectl create secret docker-registry gitlab-registry -n chess-api --docker-server=registry.eliashouse.ddns.net --docker-username="$CI_DEPLOY_USER" --docker-password="$CI_DEPLOY_PASSWORD" --dry-run=client -o yaml | kubectl apply -f -
    - |
      for dep in chess-api-primary chess-api-fallback chess-api-elias-pc chess-api-raspberrypi; do
        kubectl set image -n chess-api deployment/$dep chess-api=registry.eliashouse.ddns.net/root/chesscomapi:$CI_COMMIT_SHORT_SHA
      done
    - kubectl rollout status -n chess-api deployment/chess-api-primary &
      kubectl rollout status -n chess-api deployment/chess-api-fallback &
      kubectl rollout status -n chess-api deployment/chess-api-elias-pc &
      kubectl rollout status -n chess-api deployment/chess-api-raspberrypi &
      wait
  only:
    - master
