stages:
  - install
  - build
  - deploy

install_everything:
  variables:
    STOCKFISH_ENGINE_PATH: "/usr/bin/stockfish-17-64"
  stage: install
  script:
    - ./install.sh
    - echo "Installation complete"
    - ./test/test_flask_server.sh
    - echo "All tests passed"

build_and_push:
  stage: build
  image: docker:latest

  services:
    - name: docker:dind
      command:
        - "--insecure-registry=registry.eliashouse.ddns.net"
        - "--host=tcp://0.0.0.0:2375"
        - "--tls=false"

  variables:
    IMAGE_TAG: "registry.eliashouse.ddns.net/root/chesscomapi:latest"

  before_script:
    - docker info
    - echo "$CI_REGISTRY_PASSWORD" | docker login registry.eliashouse.ddns.net -u "$CI_REGISTRY_USER" --password-stdin

  script:
    - echo building image with tag "$IMAGE_TAG"
    - docker build -t "$IMAGE_TAG" .
    - docker push "$IMAGE_TAG"

  only:
    - master

deploy:
  stage: deploy
  script:
    - kubectl rollout restart deployment/chess-api-primary deployment/chess-api-fallback
    - kubectl rollout status deployment/chess-api-primary
    - kubectl rollout status deployment/chess-api-fallback
  only:
    - master
