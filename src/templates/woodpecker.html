<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Woodpecker</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='android-chrome-512x512.png') }}">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            background: #1e1c19;
            color: #d4d2d0;
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0 0 3em;
        }

        #page-header {
            padding: 1.2em 1.5em 0.8em;
            text-align: center;
            font-size: 0.82em;
            font-weight: 700;
            color: #666;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .layout {
            max-width: 860px;
            margin: 0 auto;
            padding: 0 1.2em;
            display: flex;
            flex-direction: column;
            gap: 1.2em;
        }

        .card {
            background: #262420;
            border: 1px solid #353230;
            border-radius: 14px;
            overflow: hidden;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75em 1em;
            border-bottom: 1px solid #2e2c29;
            font-size: 0.75em;
            font-weight: 700;
            color: #666;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
        }

        .form-cell {
            padding: 0.6em 1em;
            border-bottom: 1px solid #2e2c29;
            border-right: 1px solid #2e2c29;
        }

        .form-cell:nth-child(even) { border-right: none; }
        .form-cell.full { grid-column: 1 / -1; border-right: none; }
        .form-cell:last-child, .form-cell:nth-last-child(2):nth-child(odd) { border-bottom: none; }

        .form-cell label {
            display: block;
            font-size: 0.72em;
            font-weight: 600;
            color: #666;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 0.3em;
        }

        .form-cell input {
            width: 100%;
            background: #1a1917;
            border: 1px solid #353230;
            border-radius: 6px;
            color: #e8e6e3;
            padding: 0.4em 0.6em;
            font-size: 0.9em;
            font-family: inherit;
            outline: none;
        }

        .form-cell input:focus { border-color: #555; }

        .form-footer {
            padding: 0.75em 1em;
            display: flex;
            align-items: center;
            gap: 0.8em;
        }

        button {
            font-family: inherit;
            cursor: pointer;
            border-radius: 8px;
            font-size: 0.9em;
            padding: 0.5em 1.1em;
            border: 1px solid #383532;
            background: #262420;
            color: #c3c2c1;
            transition: background 0.15s;
        }

        button:hover:not(:disabled) { background: #33312e; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        button.primary {
            background: #2e4a2e;
            border-color: #3d6b3d;
            color: #81b64c;
        }

        button.primary:hover:not(:disabled) { background: #354f35; }

        button.danger {
            background: #3a1e1e;
            border-color: #5c2a2a;
            color: #fa412d;
        }

        button.danger:hover:not(:disabled) { background: #441f1f; }

        #create-status {
            font-size: 0.85em;
            color: #888;
        }

        /* Sets list */
        .set-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75em 1em;
            border-bottom: 1px solid #2e2c29;
            gap: 0.8em;
        }

        .set-row:last-child { border-bottom: none; }

        .set-info { flex: 1; min-width: 0; }

        .set-name {
            font-size: 1em;
            font-weight: 700;
            color: #e8e6e3;
            margin-bottom: 0.2em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .set-meta {
            font-size: 0.78em;
            color: #666;
        }

        .set-stats {
            display: flex;
            gap: 1.2em;
            flex-shrink: 0;
        }

        .stat-chip {
            text-align: center;
        }

        .stat-chip .val {
            font-size: 1em;
            font-weight: 700;
            color: #c8c6c3;
        }

        .stat-chip .lbl {
            font-size: 0.68em;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .set-actions { display: flex; gap: 0.4em; flex-shrink: 0; }

        .badge {
            display: inline-block;
            font-size: 0.7em;
            font-weight: 700;
            padding: 0.15em 0.55em;
            border-radius: 20px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            background: rgba(247,198,49,0.12);
            color: #f7c631;
            border: 1px solid rgba(247,198,49,0.25);
            margin-left: 0.4em;
        }

        .empty-state {
            padding: 2em 1em;
            text-align: center;
            color: #555;
            font-size: 0.9em;
        }

        .error-msg { color: #fa412d; font-size: 0.85em; }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-cell { border-right: none; }
            .set-stats { display: none; }
        }
    </style>
</head>
<body>
    <div id="page-header">Woodpecker</div>

    <div class="layout">
        <!-- User bar -->
        <div style="display:flex;align-items:center;gap:0.6em;padding:0.2em 0;">
            <span style="font-size:0.8em;color:#666;">User:</span>
            <input id="user-input" type="text" placeholder="username"
                style="background:#1a1917;border:1px solid #353230;border-radius:6px;color:#e8e6e3;padding:0.35em 0.6em;font-size:0.9em;font-family:inherit;outline:none;width:180px;">
            <button onclick="loadSets()">Load Sets</button>
        </div>

        <!-- Create set card -->
        <div class="card">
            <div class="card-header">Create New Set</div>
            <div class="form-grid">
                <div class="form-cell full">
                    <label>Set Name</label>
                    <input id="f-name" type="text" placeholder="e.g. Intermediate tactics">
                </div>
                <div class="form-cell">
                    <label>Min Rating</label>
                    <input id="f-min" type="number" value="1200" min="0" max="3000">
                </div>
                <div class="form-cell">
                    <label>Max Rating</label>
                    <input id="f-max" type="number" value="1600" min="0" max="3000">
                </div>
                <div class="form-cell full">
                    <label>Puzzle Count (max 2000)</label>
                    <input id="f-count" type="number" value="1000" min="10" max="2000">
                </div>
            </div>
            <div class="form-footer">
                <button class="primary" id="create-btn" onclick="createSet()">Create Set</button>
                <span id="create-status"></span>
            </div>
        </div>

        <!-- Sets list card -->
        <div class="card" id="sets-card">
            <div class="card-header">
                <span>My Sets</span>
            </div>
            <div id="sets-list"><div class="empty-state">Load a user to see their sets.</div></div>
        </div>
    </div>

    <script src="/static/woodpecker.js"></script>
</body>
</html>
