<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Play vs Stockfish</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='android-chrome-512x512.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='chessground/assets/chessground.base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='chessground/assets/chessground.brown.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='chessground/assets/chessground.cburnett.css') }}">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            background: #1e1c19;
            color: #d4d2d0;
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            margin: 0; padding: 0;
        }

        #game-header {
            padding: 0.8em 1.5em;
            text-align: center;
            font-size: 0.82em;
            font-weight: 700;
            color: #666;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .play-layout {
            display: flex;
            flex-direction: row;
            gap: 1.2em;
            padding: 0 1.2em 2em;
            align-items: flex-start;
            justify-content: center;
        }

        .board-column {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            flex-shrink: 0;
        }

        .opponent-label, .player-label {
            width: clamp(280px, 40vw, 560px);
            padding: 0.4em 0;
            font-size: 0.85em;
            font-weight: 600;
            color: #888;
            display: flex;
            align-items: center;
            gap: 0.5em;
        }

        .player-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .white-dot { background: #f0ede8; border: 1.5px solid #999; }
        .black-dot { background: #2a2825; border: 1.5px solid #888; }

        /* Eval bar + board side by side */
        .board-and-eval {
            display: flex;
            flex-direction: row;
            align-items: stretch;
            gap: 6px;
        }

        /* Eval bar wrapper (bar + score label) */
        #eval-wrap {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            flex-shrink: 0;
        }
        #eval-wrap.visible { display: flex; }

        #eval-bar {
            width: 14px;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        #eval-black {
            background: #1a1917;
            flex-grow: 50;
            transition: flex-grow 0.5s ease;
            min-height: 0;
        }
        #eval-white {
            background: #e8e5e0;
            flex-grow: 50;
            transition: flex-grow 0.5s ease;
            min-height: 0;
        }

        #eval-score {
            font-size: 0.7em;
            font-weight: 700;
            color: #888;
            font-family: 'Courier New', monospace;
            white-space: nowrap;
        }

        /* Board wrapper for overlay positioning */
        .board-wrap {
            position: relative;
            width: clamp(280px, 40vw, 560px);
            height: clamp(280px, 40vw, 560px);
        }

        .chessground_board {
            width: 100%;
            height: 100%;
        }

        /* Setup overlay — 8×8 grid on top of the board */
        #setup-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            cursor: crosshair;
            z-index: 10;
        }
        #setup-overlay.active { display: grid; }

        .setup-cell { transition: background 0.07s; }
        .setup-cell:hover { background: rgba(255, 255, 255, 0.12); }
        .setup-cell.flash-place { background: rgba(129, 182, 76, 0.45); }
        .setup-cell.flash-erase { background: rgba(250, 65, 45, 0.45); }

        .info-column {
            flex: 1;
            min-width: 0;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 0.9em;
            padding-top: 2em;
        }

        .card {
            background: #262420;
            border: 1px solid #353230;
            border-radius: 14px;
            overflow: hidden;
        }

        .card-header {
            padding: 0.7em 1em;
            border-bottom: 1px solid #2e2c29;
            font-size: 0.75em;
            font-weight: 700;
            color: #666;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        #status {
            padding: 0.7em 1em;
            font-size: 0.95em;
            font-weight: 600;
            color: #c8c6c3;
            min-height: 2.4em;
        }

        #status.check  { color: #f7c631; }
        #status.over   { color: #81b64c; }
        #status.thinking { color: #555; }

        .btn-row {
            padding: 0.7em 1em;
            display: flex;
            gap: 0.5em;
            border-top: 1px solid #2e2c29;
            flex-wrap: wrap;
        }

        button {
            font-family: inherit;
            cursor: pointer;
            border-radius: 8px;
            font-size: 0.85em;
            padding: 0.45em 0.9em;
            border: 1px solid #383532;
            background: #262420;
            color: #c3c2c1;
            transition: background 0.15s;
        }
        button:hover:not(:disabled) { background: #33312e; }
        button:disabled { opacity: 0.35; cursor: not-allowed; }
        button.active {
            background: #2e4a2e;
            border-color: #3d6b3d;
            color: #81b64c;
        }
        button.setup-active {
            background: #4a3a20;
            border-color: #7a6030;
            color: #f7c631;
        }

        /* Move history */
        #move-history {
            max-height: 320px;
            overflow-y: auto;
            font-size: 0.88em;
        }

        .move-pair {
            display: grid;
            grid-template-columns: 2em 1fr 1fr;
            gap: 0;
            border-bottom: 1px solid #222;
        }

        .move-pair:last-child { border-bottom: none; }

        .move-num {
            padding: 0.4em 0.6em;
            color: #555;
            font-size: 0.85em;
            border-right: 1px solid #2e2c29;
        }

        .move-cell {
            padding: 0.4em 0.7em;
            cursor: default;
            font-family: 'Courier New', monospace;
        }

        .move-cell:first-of-type { border-right: 1px solid #2e2c29; }
        .move-cell.engine { color: #8ab4d4; }
        .move-cell.user   { color: #c8c6c3; }

        /* Setup panel */
        #setup-panel { display: none; }

        .palette-section-label {
            font-size: 0.72em;
            font-weight: 700;
            color: #555;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 0.35em;
        }

        .palette-row {
            display: flex;
            gap: 0.3em;
            margin-bottom: 0.5em;
            flex-wrap: wrap;
        }

        .palette-btn {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #383532;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.15em;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            transition: border-color 0.1s, background 0.1s;
            user-select: none;
        }
        .palette-btn.piece-white { background: #e8e5e0; color: #1a1917; }
        .palette-btn.piece-black { background: #2a2825; color: #e8e5e0; }
        .palette-btn.piece-erase { background: #2a2825; color: #fa412d; width: auto; padding: 0 0.7em; font-family: inherit; font-size: 0.85em; }
        .palette-btn:hover { border-color: #666; }
        .palette-btn.selected { border-color: #81b64c; }
        .palette-btn.piece-white.selected { background: #c8e0b8; }
        .palette-btn.piece-black.selected { background: #1a3a1a; }
        .palette-btn.piece-erase.selected { border-color: #fa412d; }

        .setup-turn-row {
            padding: 0.5em 1em;
            display: flex;
            align-items: center;
            gap: 0.7em;
            font-size: 0.82em;
            color: #666;
            border-top: 1px solid #2e2c29;
        }

        @media (max-width: 900px) {
            .play-layout { flex-direction: column; align-items: center; padding: 0 0.5em 2em; }
            .board-column { align-items: center; }
            .info-column { max-width: 98vw; width: 98vw; padding-top: 0; }
            .board-wrap,
            .opponent-label, .player-label { width: clamp(280px, 94vw, 560px) !important; }
            .board-wrap { height: clamp(280px, 94vw, 560px) !important; }
        }
    </style>
</head>
<body>
    <div id="game-header">Play vs Stockfish</div>

    <div class="play-layout">
        <div class="board-column">
            <div class="opponent-label" id="opponent-label">
                <div class="player-dot" id="engine-dot"></div>
                <span>Stockfish</span>
            </div>
            <div class="board-and-eval">
                <div id="eval-wrap">
                    <div id="eval-bar">
                        <div id="eval-black"></div>
                        <div id="eval-white"></div>
                    </div>
                    <div id="eval-score">0.0</div>
                </div>
                <div class="board-wrap">
                    <div class="chessground_board" id="chessground_board"></div>
                    <div id="setup-overlay"></div>
                </div>
            </div>
            <div class="player-label" id="player-label">
                <div class="player-dot" id="user-dot"></div>
                <span>You</span>
            </div>
        </div>

        <div class="info-column">
            <!-- Game controls card -->
            <div class="card">
                <div id="status" class="thinking">Setting up…</div>
                <div class="btn-row">
                    <button id="btn-white" onclick="newGame('white')">White</button>
                    <button id="btn-black" onclick="newGame('black')">Black</button>
                    <button onclick="newGame(currentUserColor)" style="margin-left:auto">New Game</button>
                    <button onclick="shuffleBoard()">Shuffle</button>
                    <button id="btn-eval"  onclick="toggleEvalBar()">Eval</button>
                    <button id="btn-setup" onclick="toggleSetupMode()">Setup</button>
                </div>
                <div class="btn-row" style="border-top:1px solid #2e2c29;padding-top:0.6em;">
                    <input id="fen-input" type="text" placeholder="FEN (default: starting position)"
                        style="flex:1;background:#1a1917;border:1px solid #353230;border-radius:6px;color:#e8e6e3;padding:0.35em 0.6em;font-size:0.82em;font-family:inherit;outline:none;">
                </div>
            </div>

            <!-- Setup panel (shown only in setup mode) -->
            <div class="card" id="setup-panel">
                <div class="card-header">Board Setup — click a piece, then click a square</div>
                <div style="padding:0.7em 1em 0.3em;">
                    <div class="palette-section-label">White</div>
                    <div class="palette-row" id="palette-white"></div>
                    <div class="palette-section-label">Black</div>
                    <div class="palette-row" id="palette-black"></div>
                    <div class="palette-row">
                        <div class="palette-btn piece-erase" id="tool-erase" onclick="selectTool('erase', null)">✕ Erase</div>
                    </div>
                </div>
                <div class="setup-turn-row">
                    <span>Side to move:</span>
                    <button id="setup-turn-w" class="active" onclick="setSetupTurn('w')">White</button>
                    <button id="setup-turn-b" onclick="setSetupTurn('b')">Black</button>
                </div>
                <div class="btn-row">
                    <button onclick="clearSetupBoard()">Clear</button>
                    <button onclick="resetSetupToStart()">Starting pos</button>
                    <button onclick="exitSetupMode()" style="margin-left:auto; background:#2e4a2e; border-color:#3d6b3d; color:#81b64c;">Start Game</button>
                </div>
            </div>

            <!-- Move history card -->
            <div class="card">
                <div class="card-header">Moves</div>
                <div id="move-history"></div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='chessground.umd.js') }}"></script>
    <script src="/static/play.js"></script>
</body>
</html>
